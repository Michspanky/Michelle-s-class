<!DOCTYPE html>
<html>

<head>
    <title>Basic Form </title>
</head>

<body>
    <style>
        body {

            background-color: rgb(5, 175, 5);
        }

        #Basic {
            background-color: hsl(0, 0%, 90%);
            width: 40%;
            margin: auto;
            margin-top: 80px;
            padding: 20px;
        }

        #Basic input[type=text],
        #Basic textarea,
        #Basic button {
            background-color: #fff;
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 15px;
            border: none;
        }

        #Basic button {
            background-color: rgb(5, 175, 5);
            border: none;
        }
        #par {
            color: gray;
        }
        #car {
            color: rgb(13, 164, 202);
        }
        #farm {
            color: lightcyan;
        }
        
    </style>

    <div id="Basic">
        <form>
            <h1 id="farm">Colorlib Contact Form</h1>
            <h2 id="farm">Contact us for custom quote</h2>
            <input type="text" placeholder="Your name"><br>
            <input type="text" placeholder="Your Email Address"><br>
            <input type="text" placeholder="Your Phone Number (optional)"><br>
            <input type="text" placeholder="Your Web Site (optional)"><br>
            <textarea name="" id="" rows="5" placeholder="Type your message here ...."></textarea>
            <button type="submit"> Submit</button>
            <h3 id="par">Design by <u id="car">colorib</u></h3>
        </form>
    </div>







</body>

</html>
