<!DOCTYPE html>
<html>

<head>
    <title>Login </title>
</head>
<style>
    #book {
        color: blue;
    }

    #car {
        color: lightgray;
    }

    #gar {
        color: black;
    }

    #flex {
        display: flex;
        justify-content: center;
        /* flex-wrap: wrap; */
        max-width: 1200px;
        margin: 15px;
        margin-top: auto;
        padding: 15px;

    }

    #flex>div {
        width: 40%;
    }

    #or {
        background-color: white;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
        width: 100%;
        padding: 15px;
        margin: 10px;

    }

    #happy {
        color: #9494c9;
        text-align: center;
    }

    form {
        background-color: white;
        box-shadow: 0px 0px 5px lightgrey;
        padding: 15px;
        border-radius: 8px;
        padding: 10px;
    }

    form input{
        width: 100%;
    }

    #or button[type=submit] {
        background-color: blue;
        border-radius: 5px;
        width: 100%;
        color: white;
        border: none;
        padding: 10px;
    }


    @media (max-width:767px) {
        #car {
            display: none;
        }

        #flex>div {
            width: 90%;
        }

        form {
            width: 100%;
        }
    }

    #man {
        text-align: center;
        margin-top: 5px;
        
    }
   
    a { 
        text-decoration: none;
    }
#create-btn {
    background-color: lawngreen;
    border-radius: 5px;
    border: none;
    text-align: center;
    padding: 10px;
    margin: 10px;
}
</style>

<body>
    <div id="flex">

        <div id="car">

            <h2 id="book">Facebook</h2>
            <p id="gar">Connect with friends and the world around you on Facebook
        </div>
        <div id="or">
            <form>
                <input type="text" placeholder="Email or phone number"><br><br>
                <input type="text" placeholder="Password"><br><br>
                <button type="submit">Login</button>
                <div id="man">
                    <a  href="#"> Forgot Password?</a>
                </div>
                <hr>
                <button id="create-btn">Create new account</button>
            </form>
        </div>
    </div>
</body>

</html>
