<!DOCTYPE html>
<html>

<head>
    <title>A form </title>
    <style>
        body {
            background:#f6c6c6;
            margin: 20px;
            border: 4px solid black;
            padding: 20px;
        }

        header {
            background:#b8b8e6 ;
            padding: 20px;
            margin-bottom: 20px;
            border: 3px solid black;

        }

        main {
            display: flex;
            gap: 20px;
        }

        .left {
            flex: 2;
        }

        aside p {
            flex: 1;
            background: #f6c6c6;
            padding: 20px;
            border-radius: 10px;
        }

        .img-box {
            background:#b8b8e6;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        article {
            background: lightpink;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        h2 {
            background: plum;
            padding: 10px;

        }

        p {
            background: plum;
            padding: 10px;
        }
    </style>

</head>

<body>
    <header>
        <h1>header</h1>
    </header>

    <main>
        <div class="left">
            <div class="img-box">
                Image
            </div>
            <article>
                <h2>Headline 1</h2>
                <p>Content</p>
            </article>

            <article>
                <h2>Headline 2</h2>
                <p>Content</p>
            </article>

        </div>

        <aside>
            <h2>Aside</h2>
            <p>Content</p>
        </aside>
    </main>

</body>

</html>
